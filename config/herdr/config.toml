onboarding = false

[keys]
prefix = "ctrl+b"
detach = "prefix+q"
new_tab = "prefix+t"
close_tab = "prefix+w"
rename_tab = "prefix+,"
previous_tab = "prefix+p"
next_tab = "prefix+n"
switch_tab = "prefix+1..9"
split_vertical = "prefix+r"
split_horizontal = "prefix+d"
last_pane = "prefix+;"
close_pane = "prefix+x"
copy_mode = "prefix+["
reload_config = "prefix+shift+r"
resize_mode = "prefix+s"
zoom = "prefix+z"
focus_pane_up = "prefix+k"
focus_pane_down = "prefix+j"
focus_pane_left = "prefix+h"
focus_pane_right = "prefix+l"
toggle_sidebar = "prefix+b"

[[keys.command]]
key = "prefix+alt+g"
type = "pane"
command = "lazygit"

[theme]
name = "terminal"
auto_switch = true
dark_name = "dracula"
light_name = "catppuccin-latte"

[session]
resume_agents_on_restore = true

[ui]
show_agent_labels_on_pane_borders = true

[ui.toast]
delivery = "system"

[ui.sound]
enabled = false
